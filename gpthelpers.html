<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Анимация велосипеда 🚲</title>

<style>
body {
  margin: 0;
  background: #0f172a;
  overflow: hidden;
}

/* дорога */
.road {
  width: 100%;
  height: 200px;
  position: relative;
  top: 50vh;
  transform: translateY(-50%);
  background: linear-gradient(#1e293b 60%, #334155 60%);
}

/* велосипед */
.bike {
  position: absolute;
  bottom: 20px;
  left: -220px;
  animation: ride 6s linear infinite;
}

/* колёса */
.wheel {
  fill: none;
  stroke: #22c55e;
  stroke-width: 4;
  transform-origin: center;
  animation: spin 0.7s linear infinite;
}

/* движение велосипеда */
@keyframes ride {
  0% { left: -220px; }
  100% { left: 100%; }
}

/* вращение колёс */
@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="road">
  <div class="bike">
    <svg viewBox="0 0 200 100" width="200">

      <!-- колёса -->
      <circle class="wheel" cx="40" cy="70" r="25"/>
      <circle class="wheel" cx="150" cy="70" r="25"/>

      <!-- рама -->
      <line x1="40" y1="70" x2="90" y2="40" stroke="#22c55e" stroke-width="3"/>
      <line x1="90" y1="40" x2="120" y2="70" stroke="#22c55e" stroke-width="3"/>
      <line x1="120" y1="70" x2="40" y2="70" stroke="#22c55e" stroke-width="3"/>

      <!-- руль -->
      <line x1="120" y1="70" x2="140" y2="40" stroke="#22c55e" stroke-width="3"/>

      <!-- сиденье -->
      <line x1="90" y1="40" x2="90" y2="25" stroke="#22c55e" stroke-width="3"/>
      <line x1="80" y1="25" x2="100" y2="25" stroke="#22c55e" stroke-width="3"/>

      <!-- педаль -->
      <circle cx="90" cy="55" r="5" fill="#22c55e"/>

    </svg>
  </div>
</div>

</body>
</html>
