
<!DOCTYPE html>
<html>
<head>

	<title>try-everything</title>
	 <meta charset="utf-8">
	<!-- Latest compiled and minified CSS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
<!-- jQuery library -->
<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.slim.min.js"></script>
<!-- Popper JS -->
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
<!-- Latest compiled JavaScript -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<link rel="stylesheet" type="text/css" href='s/lu.css'>
<style>
.bike {
  position: absolute;
  bottom: 20px;
  left: -220px;
  animation: ride 6s linear infinite;
}

/* колёса */
.wheel {
  fill: none;
  stroke: white;
  stroke-width: 4;
  animation: spin 0.7s linear infinite;
  transform-origin: center;
}

/* движение */
@keyframes ride {
  0% { left: -220px; }
  100% { left: 100%; }
}

/* вращение */
@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
	
</style> 
</head>

<body>
<div> mawmaw </div>

<div class="road">
  <div class="bike">
    <svg viewBox="0 0 200 100" width="200">

      <!-- заднее колесо -->
      <circle class="wheel" cx="40" cy="70" r="25"/>

      <!-- переднее колесо -->
      <circle class="wheel" cx="150" cy="70" r="25"/>

      <!-- рама -->
      <line x1="40" y1="70" x2="90" y2="40" stroke="white" stroke-width="3"/>
      <line x1="90" y1="40" x2="120" y2="70" stroke="white" stroke-width="3"/>
      <line x1="120" y1="70" x2="40" y2="70" stroke="white" stroke-width="3"/>

      <!-- руль -->
      <line x1="120" y1="70" x2="140" y2="40" stroke="white" stroke-width="3"/>

      <!-- сиденье -->
      <line x1="90" y1="40" x2="90" y2="25" stroke="white" stroke-width="3"/>
      <line x1="80" y1="25" x2="100" y2="25" stroke="white" stroke-width="3"/>

      <!-- педаль -->
      <circle cx="90" cy="55" r="5" fill="white"/>

    </svg>
  </div>
</div>

<script>function scrollToSection() {
  document.getElementById('types').scrollIntoView({ behavior: 'smooth' });
}
</script>
</body>
</html>
